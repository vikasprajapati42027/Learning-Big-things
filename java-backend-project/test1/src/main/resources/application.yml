spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shorturldata?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
  cache:
    type: caffeine

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
