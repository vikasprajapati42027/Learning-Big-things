version: '3.8'

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=test
    ports:
      - "9870:9870"
    volumes:
      - namenode_data:/hadoop/dfs/name
    restart: always

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    restart: always

  mysql:
    image: mysql:8.0
    container_name: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    ports:
      - "3307:3306"
    restart: always

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    command: >
      bash -c "
      echo 'Waiting for MySQL...' &&
      sleep 60 &&
      /opt/hive/bin/schematool \
        -dbType mysql \
        -url jdbc:mysql://mysql:3306/metastore \
        -driver com.mysql.cj.jdbc.Driver \
        -userName hive \
        -passWord hive \
        -initSchema || echo 'Schema already exists' &&
      echo 'Starting Hive Metastore...' &&
      /opt/hive/bin/hive --service metastore
      "
    volumes:
      - ./hive-lib/mysql-connector-j-8.0.33.jar:/opt/hive/lib/mysql-connector-j-8.0.33.jar
    environment:
      - SERVICE_NAME=metastore
      - HIVE_METASTORE_DB_TYPE=mysql
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:mysql://mysql:3306/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=com.mysql.cj.jdbc.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
    depends_on:
      - mysql
      - namenode
    restart: always

  hive-server:
    image: apache/hive:3.1.3
    container_name: hive-server
    command: >
      bash -c "
      echo 'Waiting for Hive Metastore...' &&
      sleep 90 &&
      echo 'Starting HiveServer2...' &&
      /opt/hive/bin/hiveserver2
      "
    volumes:
      - ./hive-lib/mysql-connector-j-8.0.33.jar:/opt/hive/lib/mysql-connector-j-8.0.33.jar
    environment:
      - SERVICE_NAME=hiveserver2
      - HIVE_METASTORE_DB_TYPE=mysql
      - HIVE_SERVER2_THRIFT_BIND_HOST=0.0.0.0
      - HIVE_SERVER2_THRIFT_PORT=10000
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:mysql://mysql:3306/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=com.mysql.cj.jdbc.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
    ports:
      - "10000:10000"
    depends_on:
      - hive-metastore
    restart: always

  spark-master:
    image: apache/spark:3.4.1
    container_name: spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /dev/null
      "
    ports:
      - "8090:8080"
      - "7077:7077"
    restart: always

  spark-worker:
    image: apache/spark:3.4.1
    container_name: spark-worker
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
      "
    depends_on:
      - spark-master
    restart: always

volumes:
  namenode_data:
  datanode_data:
