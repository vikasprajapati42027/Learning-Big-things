# Spring Boot Application Name
spring.application.name=vault-demo-service

# HashiCorp Vault Configuration
spring.cloud.vault.uri=http://localhost:8200
spring.cloud.vault.token=my-root-token
spring.cloud.vault.authentication=token

# Importing configuration from Vault
spring.config.import=vault://

# Mock value for testing without a running Vault instance
# In real scenario, this would be retrieved from Vault
my.db.password=${VAULT_DB_PASSWORD:vault_secret_123}
